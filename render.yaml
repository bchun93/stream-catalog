# Render Blueprint — deploy API from GitHub (replaces AWS App Runner)
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: stream-catalog-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: TMDB_API_KEY
        sync: false
      - key: INGEST_S3_BUCKET
        sync: false
      - key: INGEST_S3_PREFIX
        sync: false
      - key: ASPERA_DROP_PREFIX
        sync: false
      - key: INGEST_OPERATOR_TOKEN
        sync: false
      - key: ADMIN_API_KEY
        sync: false
      - key: SEED_ON_STARTUP
        value: "true"
      # Do not set PORT — Render injects it at runtime (e.g. 10000). The app must listen on $PORT.
      # Optional: comma-separated Amplify URL(s) if CORS regex is not enough
      - key: CORS_ORIGINS
        sync: false
