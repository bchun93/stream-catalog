# Render Blueprint — deploy API from GitHub (replaces AWS App Runner)
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: stream-catalog-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: TMDB_API_KEY
        sync: false
      - key: SEED_ON_STARTUP
        value: "true"
      - key: PORT
        value: "8000"
