version: 1
applications:
  - appRoot: frontend
    frontend:
      phases:
        preBuild:
          commands:
            - npm ci
            - |
              if [ -z "${VITE_API_URL:-}" ]; then
                echo "============================================================"
                echo "ERROR: VITE_API_URL is not set."
                echo "Amplify Console → App settings → Environment variables"
                echo "  Name:  VITE_API_URL"
                echo "  Value: https://your-service.onrender.com"
                echo "Then redeploy. See DEPLOYMENT.md"
                echo "============================================================"
                exit 1
              fi
              echo "Building with VITE_API_URL=${VITE_API_URL}"
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: dist
        files:
          - "**/*"
      cache:
        paths:
          - node_modules/**/*
    customHeaders:
      - pattern: "**/*"
        headers:
          - key: Cache-Control
            value: public, max-age=0, must-revalidate
